services:
  sepa-system:
    image: ghcr.io/sudeep-sasikumar/markminervini:latest
    pull_policy: always            # always pull latest image on every deploy — never use stale local cache
    container_name: minervini_sepa
    restart: always
    ports:
      - "8501:8501"          # Streamlit dashboard
    volumes:
      - sepa_data:/app/data/db  # SQLite DB only — /app/data/db/sepa.db
      - sepa_logs:/app/logs     # Logs persist across restarts
      # IMPORTANT: mount is at /app/data/db/ (not /app/data/) so the volume
      # never overlays the Python source files in /app/data/*.py
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
      - ACCOUNT_EQUITY_GBP=${ACCOUNT_EQUITY_GBP:-50000}
      - RISK_PER_TRADE_PCT=${RISK_PER_TRADE_PCT:-0.015}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - DB_PATH=/app/data/db/sepa.db
      - LOG_PATH=/app/logs/sepa.log
    depends_on:
      ollama:
        condition: service_started
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    command: serve

  # One-shot init container: waits for Ollama server, pulls the AI model, then exits.
  # Uses only the ollama CLI (no curl dependency) so works with the official image.
  # sepa-system waits for this to complete successfully before starting.
  ollama-pull:
    image: ollama/ollama
    container_name: ollama_pull
    restart: "no"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
    entrypoint: /bin/sh
    command: >
      -c "
        echo 'Waiting for Ollama server...';
        until ollama list > /dev/null 2>&1; do
          echo 'Ollama not ready yet — retrying in 3s...';
          sleep 3;
        done;
        echo 'Ollama ready. Pulling model: '\"$OLLAMA_MODEL\";
        ollama pull \"${OLLAMA_MODEL:-llama3.2:3b}\";
        echo 'Model pull complete.';
      "

volumes:
  sepa_data:
  sepa_logs:
  ollama_data:
