name: CI — Test + Build + Push Docker Image

# On every push to main that touches MarkMinervini code:
#   1. Run unit tests (reports failures but does NOT block Docker push)
#   2. Build multi-arch Docker image and push to ghcr.io
#
# After CI completes (~4-6 min):
#   Hostinger Docker Manager → pull latest image → restart container

on:
  push:
    branches: [main]
    paths:
      - "MarkMinervini/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # Job 1: unit tests  (informational — does NOT block the Docker build)
  # -----------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r MarkMinervini/requirements-test.txt

      - name: Syntax check
        run: python -m compileall -q MarkMinervini

      - name: Run unit tests
        run: pytest MarkMinervini/tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # Job 2: build and push Docker image (runs even if tests fail)
  # -----------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    # Removed "needs: test" so Docker push is never blocked by test failures.
    # Test failures are visible in the Actions tab as a warning.

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./MarkMinervini
          file: ./MarkMinervini/Dockerfile
          push: true
          tags: |
            ghcr.io/sudeep-sasikumar/markminervini:latest
            ghcr.io/sudeep-sasikumar/markminervini:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ghcr.io/sudeep-sasikumar/markminervini:latest (${{ github.sha }})"
