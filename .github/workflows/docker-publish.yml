name: CI -- Test + Build + Push Docker Image

# On every push to main that touches MarkMinervini code:
#   1. Run unit tests (informational -- does NOT block Docker push)
#   2. Build multi-arch Docker image and push to ghcr.io
#
# After CI completes (~4-6 min):
#   Hostinger Docker Manager: pull latest image, restart container.
#   Confirm deployment: check "Build Info" panel on System Status page --
#   the GIT_COMMIT and BUILD_DATE must match the current GitHub commit.

on:
  push:
    branches: [main]
    paths:
      - "MarkMinervini/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # Job 1: unit tests  (informational -- does NOT block the Docker build)
  # -----------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r MarkMinervini/requirements-test.txt

      - name: Syntax check
        run: python -m compileall -q MarkMinervini

      - name: Run unit tests
        run: pytest MarkMinervini/tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # Job 2: build and push Docker image (runs regardless of test outcome)
  # -----------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    # No "needs: test" -- Docker push never blocked by test failures.

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Get build timestamp (UTC)
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./MarkMinervini
          file: ./MarkMinervini/Dockerfile
          push: true
          tags: |
            ghcr.io/sudeep-sasikumar/markminervini:latest
            ghcr.io/sudeep-sasikumar/markminervini:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          no-cache: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.date.outputs.date }}

      - name: Image digest
        run: echo "Pushed ghcr.io/sudeep-sasikumar/markminervini:latest (${{ github.sha }})"
