name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Job 1: syntax check + unit tests
  # Must pass before the Docker image is built.
  # -------------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r MarkMinervini/requirements-test.txt

      - name: Syntax check — compileall
        run: python -m compileall -q MarkMinervini

      - name: Run unit tests
        run: pytest MarkMinervini/tests/ -v --tb=short

  # -------------------------------------------------------------------------
  # Job 2: build and push multi-arch Docker image
  # Only runs after lint-and-test passes.
  # -------------------------------------------------------------------------
  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./MarkMinervini
          file: ./MarkMinervini/Dockerfile
          push: true
          tags: |
            ghcr.io/sudeep-sasikumar/markminervini:latest
            ghcr.io/sudeep-sasikumar/markminervini:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
